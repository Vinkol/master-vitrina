version: '3.8'

services:
  # 1. База данных PostgreSQL
  postgres_db:
    image: postgres:16-alpine
    container_name: twa_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_twa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Python FastAPI Бэкенд
  backend_api:
    build: ./backend
    container_name: twa_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=MASTER VITRINA TWA API
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_DAYS=7
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. React Frontend (Раздается через Nginx)
  frontend_app:
    build: ./frontend
    container_name: twa_react
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend_api

volumes:
  pg_twa_data:
